name: Build Helios iOS

on:
  push:
    branches: [ios, main]
    paths:
      - 'Helios/**'
      - 'HeliosIOS/**'
      - 'HeliosWidget/**'
      - 'Helios.xcodeproj/**'
      - '.github/workflows/build-ios.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # Find the latest Xcode on the runner
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "No Xcode found in /Applications"
            exit 1
          fi
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install iOS platform
        run: xcodebuild -downloadPlatform iOS

      - name: Build iOS archive (unsigned)
        run: |
          xcodebuild archive \
            -scheme HeliosIOS \
            -destination 'generic/platform=iOS' \
            -archivePath build/HeliosIOS.xcarchive \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            -skipPackagePluginValidation \
            -skipMacroValidation

      - name: Package IPA
        run: |
          mkdir -p build/Payload
          cp -R build/HeliosIOS.xcarchive/Products/Applications/HeliosIOS.app build/Payload/
          cd build && zip -r HeliosIOS.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeliosIOS
          path: build/HeliosIOS.ipa
          retention-days: 30
